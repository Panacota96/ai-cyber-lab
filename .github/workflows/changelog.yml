name: Changelog

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: read

jobs:
  enforce:
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Require changelog or skip label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = pr.labels.map((label) => label.name);
            if (labels.includes('skip-changelog')) {
              core.info('skip-changelog label present; bypassing changelog requirement.');
              return;
            }

            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const hasChangelog = files.some((file) => file.filename === 'ctf-recon-tool/CHANGELOG.md');
            if (!hasChangelog) {
              core.setFailed('CHANGELOG.md must be updated unless the PR has the skip-changelog label.');
            }
