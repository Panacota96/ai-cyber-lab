name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - ctf-recon-tool/docs/badges/coverage.json
  schedule:
    - cron: '17 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf-recon-tool
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ctf-recon-tool/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=high

  trivy-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -f ctf-recon-tool/Dockerfile -t helms-watch:ci ./ctf-recon-tool

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: helms-watch:ci
          severity: HIGH,CRITICAL
          ignore-unfixed: false
          exit-code: '1'
