name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Compile
        run: python -m compileall apps libs scripts tests

      - name: Unit tests
        run: python -m pytest -q tests

      - name: Prompt regression
        run: python scripts/run_prompt_regression.py --min-pass-rate 90

      - name: Changelog policy
        run: python scripts/check_changelog.py
