name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Stable semver tag (vX.Y.Z)'
        required: true
        type: string

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref_name || github.event.inputs.tag }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid stable semver tag: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}

      - name: Extract changelog section
        id: notes
        shell: bash
        run: |
          VERSION="${{ steps.tag.outputs.version }}"
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const version = process.env.VERSION;
          const changelogPath = path.join(process.cwd(), 'ctf-recon-tool', 'CHANGELOG.md');
          const changelog = fs.readFileSync(changelogPath, 'utf8');

          const sectionRegex = new RegExp(`^## \\[${version.replace(/[.*+?^${}()|[\\]\\\\]/g, '\\\\$&')}\\] - .*\\n([\\s\\S]*?)(?=^## \\[|\\Z)`, 'm');
          const match = changelog.match(sectionRegex);
          if (!match) {
            console.error(`Missing changelog section for version [${version}] in ctf-recon-tool/CHANGELOG.md`);
            process.exit(1);
          }

          const notesPath = path.join(process.cwd(), 'release-notes.md');
          const notes = `## Helm's Watch v${version}\n\n${match[1].trim()}\n`;
          fs.writeFileSync(notesPath, notes, 'utf8');
          NODE
        env:
          VERSION: ${{ steps.tag.outputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Helm's Watch ${{ steps.tag.outputs.tag }}
          body_path: release-notes.md
          prerelease: false
