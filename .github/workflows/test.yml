name: Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - ctf-recon-tool/docs/badges/coverage.json
  workflow_dispatch:

concurrency:
  group: test-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  vitest:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ctf-recon-tool
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ctf-recon-tool/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test
