version: 2
updates:
  - package-ecosystem: npm
    directory: /ctf-recon-tool
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 10
    commit-message:
      prefix: deps

  - package-ecosystem: docker
    directory: /ctf-recon-tool
    schedule:
      interval: weekly
      day: monday
      time: "05:00"
      timezone: UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
