apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicl-orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicl-orchestrator
  template:
    metadata:
      labels:
        app: aicl-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: aicl-orchestrator:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: AICL_QDRANT_URL
              value: http://aicl-qdrant:6333
            - name: AICL_OLLAMA_URL
              value: http://aicl-ollama:11434
            - name: AICL_GRAPH_BACKEND
              value: auto
            - name: AICL_NEO4J_URI
              value: bolt://aicl-neo4j:7687
            - name: AICL_NEO4J_HTTP_URL
              value: http://aicl-neo4j:7474
            - name: AICL_NEO4J_USER
              value: neo4j
            - name: AICL_NEO4J_PASSWORD
              value: neo4j-dev-password
            - name: AICL_NEO4J_DATABASE
              value: neo4j
            - name: AICL_EXEC_BACKEND
              value: service
            - name: AICL_TOOL_EXEC_URL
              value: http://aicl-tool-exec:8082
            - name: AICL_API_HOST
              value: 0.0.0.0
            - name: AICL_API_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: aicl-orchestrator
spec:
  selector:
    app: aicl-orchestrator
  ports:
    - name: http
      port: 8080
      targetPort: 8080
