apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicl-tool-exec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicl-tool-exec
  template:
    metadata:
      labels:
        app: aicl-tool-exec
    spec:
      containers:
        - name: tool-exec
          image: aicl-tool-exec:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
          env:
            - name: AICL_TOOL_EXEC_MODE
              value: local
            - name: AICL_ALLOWED_TOOLS
              value: nmap,ffuf,gobuster,nikto,whatweb,sqlmap,nuclei,python3,pip,pytest,uv
---
apiVersion: v1
kind: Service
metadata:
  name: aicl-tool-exec
spec:
  selector:
    app: aicl-tool-exec
  ports:
    - name: http
      port: 8082
      targetPort: 8082
