apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aicl-qdrant
spec:
  serviceName: aicl-qdrant
  replicas: 1
  selector:
    matchLabels:
      app: aicl-qdrant
  template:
    metadata:
      labels:
        app: aicl-qdrant
    spec:
      containers:
        - name: qdrant
          image: qdrant/qdrant:latest
          ports:
            - containerPort: 6333
            - containerPort: 6334
          volumeMounts:
            - name: qdrant-storage
              mountPath: /qdrant/storage
  volumeClaimTemplates:
    - metadata:
        name: qdrant-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aicl-qdrant
spec:
  selector:
    app: aicl-qdrant
  ports:
    - name: http
      port: 6333
      targetPort: 6333
    - name: grpc
      port: 6334
      targetPort: 6334
