apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: aicl-neo4j
spec:
  serviceName: aicl-neo4j
  replicas: 1
  selector:
    matchLabels:
      app: aicl-neo4j
  template:
    metadata:
      labels:
        app: aicl-neo4j
    spec:
      containers:
        - name: neo4j
          image: neo4j:5-community
          env:
            - name: NEO4J_AUTH
              value: neo4j/neo4j-dev-password
          ports:
            - name: http
              containerPort: 7474
            - name: bolt
              containerPort: 7687
          volumeMounts:
            - name: neo4j-data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: neo4j-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: aicl-neo4j
spec:
  selector:
    app: aicl-neo4j
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
