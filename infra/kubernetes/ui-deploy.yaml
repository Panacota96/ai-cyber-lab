apiVersion: apps/v1
kind: Deployment
metadata:
  name: aicl-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aicl-ui
  template:
    metadata:
      labels:
        app: aicl-ui
    spec:
      containers:
        - name: ui
          image: aicl-ui:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
          env:
            - name: AICL_ORCHESTRATOR_URL
              value: http://aicl-orchestrator:8080
            - name: AICL_UI_PORT
              value: "8091"
---
apiVersion: v1
kind: Service
metadata:
  name: aicl-ui
spec:
  selector:
    app: aicl-ui
  ports:
    - name: http
      port: 8091
      targetPort: 8091
