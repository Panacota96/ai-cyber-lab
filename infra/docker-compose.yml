services:
  ollama:
    image: ollama/ollama:latest
    container_name: aicl-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aicl-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped

  # Optional profile for observability experiments.
  # For production/self-host hardening, use Langfuse official compose docs.
  langfuse:
    image: langfuse/langfuse:latest
    container_name: aicl-langfuse
    profiles: ["observability"]
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-db:5432/langfuse
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: change-me-in-prod
      SALT: change-me-in-prod
      TELEMETRY_ENABLED: "false"
    depends_on:
      - langfuse-db

  langfuse-db:
    image: postgres:16-alpine
    container_name: aicl-langfuse-db
    profiles: ["observability"]
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_db:/var/lib/postgresql/data

volumes:
  ollama:
  qdrant_storage:
  langfuse_db:
